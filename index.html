/* =========================================================================
   EVENTS per screen
   Toutes les requêtes sont scopées à "root" (l'écran fraîchement rendu) et
   non à document, car pendant une transition push/pop l'ancien écran reste
   brièvement dans le DOM avec les mêmes ids (backBtn, itemList...).
   Interroger document.getElementById risquerait d'attraper le mauvais élément.
   ========================================================================= */
function attachScreenEvents(screenName, root){
  // Remis à zéro à chaque écran ; seul catDetail la réapplique dans sa propre couleur.
  const qaSend = document.getElementById("quickAddSend");
  if(qaSend) qaSend.style.background = "";

  if(screenName === "dashboard"){
    const chooseBtn = root.querySelector("#chooseCatBtn");
    if(chooseBtn) chooseBtn.addEventListener("click", openThemePickerModal);

    const planBtn = root.querySelector("#planSlotBtn");
    if(planBtn) planBtn.addEventListener("click", ()=>{
      state.stack = [{screen:"plages"}];
      renderStack();
    });

    const sel = root.querySelector("#slotThemeSelect");
    if(sel) sel.addEventListener("change", (e)=>{
      state.currentSlotThemeOverride = e.target.value;
      state.currentItemOverride = null;
      renderStack();
    });

    const showAll = root.querySelector("#showAllTasksLink");
    if(showAll) showAll.addEventListener("click", ()=>{
      state.stack = [{screen:"cats"}, {screen:"projectDetail", projectId: showAll.dataset.project}];
      state.projetsStackMemory = [...state.stack];
      renderStack();
    });

    const skipBtn = root.querySelector("#skipNextBtn");
    if(skipBtn) skipBtn.addEventListener("click", async ()=>{
      const itemKind = skipBtn.dataset.itemKind;
      const currentId = skipBtn.dataset.currentId;
      const nextId = skipBtn.dataset.nextId;
      if(itemKind === "project"){
        // Les deux sont des sous-tâches du même projet : on échange simplement leur ordre
        const tasks = await idbGetAll("tasks");
        const cur = tasks.find(t=>t.id===currentId);
        const nxt = tasks.find(t=>t.id===nextId);
        if(cur && nxt){
          const tmp = cur.order;
          cur.order = nxt.order;
          nxt.order = tmp;
          await idbPut("tasks", cur);
          await idbPut("tasks", nxt);
        }
      } else {
        // La tâche en cours est une tâche seule : on force juste l'affichage sur le suivant,
        // la tâche en cours redeviendra naturellement "prochaine tâche" au prochain calcul.
        state.currentItemOverride = nextId;
      }
      renderStack();
    });

    root.querySelectorAll("[data-checktask]").forEach(el=>{
      el.addEventListener("click", async ()=>{
        const id = el.dataset.checktask;
        const task = (await idbGetAll("tasks")).find(t=>t.id===id);
        if(task){ task.status = task.status==="done" ? "todo" : "done"; await idbPut("tasks", task); renderStack(); }
      });
    });

    root.querySelectorAll("[data-switch-theme]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        state.currentSlotThemeOverride = btn.dataset.switchTheme;
        state.currentItemOverride = btn.dataset.switchItem || null;
        renderStack();
      });
    });
  }

  if(screenName === "cats"){
    root.querySelector("#addCatBtn").addEventListener("click", ()=>{
      const holder = root.querySelector("#catFormHolder");
      holder.innerHTML = catFormHtml();
      attachCatFormEvents(root);
    });
    root.querySelectorAll(".cat-row").forEach(row=>{
      row.addEventListener("click", (e)=>{
        if(row.classList.contains("dragging")) return;
        if(row.classList.contains("swiped-open")){ closeSwipeRow(row); return; }
        pushScreen({screen:"catDetail", themeId: row.dataset.cat});
      });
    });
    makeDraggable(root, "#catList", ".cat-row", "themes", {
      onEdit: async (id)=>{
        const theme = (await idbGetAll("themes")).find(t=>t.id===id);
        if(theme) openCatEditModal(theme);
      },
      onDelete: async (id)=>{
        const theme = (await idbGetAll("themes")).find(t=>t.id===id);
        if(!theme || theme.isDefault) return;
        const projects = await idbGetAll("projects");
        const tasks = await idbGetAll("tasks");
        for(const p of projects) if(p.themeId===id){ p.themeId="default"; await idbPut("projects", p); }
        for(const t of tasks) if(t.themeId===id){ t.themeId="default"; await idbPut("tasks", t); }
        await idbDelete("themes", id);
        renderStack();
      }
    });
  }

  if(screenName === "catDetail"){
    root.querySelector("#backBtn").addEventListener("click", popScreen);
    root.querySelector("#addProjectBtn").addEventListener("click", ()=>{
      const themeId = state.stack[state.stack.length-1].themeId;
      openItemModal("project", null, {themeId});
    });
    const editCatBtn = root.querySelector("#editCatBtn");
    if(editCatBtn) editCatBtn.addEventListener("click", async ()=>{
      const themeId = state.stack[state.stack.length-1].themeId;
      const theme = (await idbGetAll("themes")).find(t=>t.id===themeId);
      if(theme) openCatEditModal(theme);
    });
    (async ()=>{
      const themeId = state.stack[state.stack.length-1].themeId;
      const theme = (await idbGetAll("themes")).find(t=>t.id===themeId);
      if(theme) applyCategoryColorToScreen(root, theme.color);
    })();
    attachItemRowEvents(root);
    attachDoneSectionEvents(root);
    fillSubcounts(root);
    makeDraggable(root, "#itemList", ".item-row", "mixed", {
      onEdit: async (id, kind)=>{
        const store = kind === "project" ? "projects" : "tasks";
        const obj = (await idbGetAll(store)).find(x=>x.id===id);
        if(obj) openItemModal(kind, obj, {});
      },
      onDelete: async (id, kind)=>{
        const store = kind === "project" ? "projects" : "tasks";
        if(kind === "project"){
          const subs = await getSubtasks(id);
          for(const s of subs) await idbDelete("tasks", s.id);
        }
        await idbDelete(store, id);
        renderStack();
      }
    });
  }

  if(screenName === "projectDetail"){
    root.querySelector("#backBtn").addEventListener("click", popScreen);
    const editProjectBtn = root.querySelector("#editProjectBtn");
    if(editProjectBtn) editProjectBtn.addEventListener("click", async ()=>{
      const projectId = state.stack[state.stack.length-1].projectId;
      const project = (await idbGetAll("projects")).find(p=>p.id===projectId);
      if(project) openItemModal("project", project, {});
    });
    (async ()=>{
      const projectId = state.stack[state.stack.length-1].projectId;
      const project = (await idbGetAll("projects")).find(p=>p.id===projectId);
      if(project){
        const theme = (await idbGetAll("themes")).find(t=>t.id===project.themeId);
        if(theme) applyCategoryColorToScreen(root, theme.color);
      }
    })();
    attachItemRowEvents(root);
    attachDoneSectionEvents(root);
    makeDraggable(root, "#itemList", ".item-row", "tasks", {
      onEdit: async (id)=>{
        const obj = (await idbGetAll("tasks")).find(x=>x.id===id);
        if(obj) openItemModal("task", obj, {});
      },
      onDelete: async (id)=>{
        await idbDelete("tasks", id);
        renderStack();
      }
    });
  }

  if(screenName === "plages"){
    root.querySelector("#addSlotBtn").addEventListener("click", ()=>{
      const now = new Date();
      const h = now.getMinutes() > 30 ? (now.getHours()+1) % 24 : now.getHours();
      openSlotModal(null, state.plagesSelectedDate, h);
    });
    root.querySelector("#weekPrev").addEventListener("click", ()=>{
      state.plagesWeekOffset -= 1;
      shiftSelectedDate(-7);
      renderStack();
    });
    root.querySelector("#weekNext").addEventListener("click", ()=>{
      state.plagesWeekOffset += 1;
      shiftSelectedDate(7);
      renderStack();
    });
    root.querySelectorAll(".day-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        state.plagesSelectedDate = btn.dataset.date;
        renderStack();
      });
    });
    const copyBtn = root.querySelector("#copyWeekBtn");
    if(copyBtn) copyBtn.addEventListener("click", async ()=>{
      await copyPreviousWeekSlots();
      renderStack();
    });
    root.querySelectorAll(".hour-row").forEach(row=>{
      row.addEventListener("click", ()=>{
        openSlotModal(null, state.plagesSelectedDate, parseInt(row.dataset.hour, 10));
      });
    });
    root.querySelectorAll(".slot-block").forEach(block=>{
      block.addEventListener("click", async (e)=>{
        e.stopPropagation();
        const slot = (await idbGetAll("timeslots")).find(s=>s.id===block.dataset.slot);
        if(slot) openSlotModal(slot, null, null);
      });
    });
  }

  if(screenName === "habitudes"){
    root.querySelector("#addHabitBtn").addEventListener("click", ()=> openHabitModal(null));
    root.querySelector("#momentFilter").addEventListener("change", (e)=>{
      state.habitsMomentFilter = e.target.value;
      renderStack();
    });
    root.querySelector("#energyFilter").addEventListener("change", (e)=>{
      state.habitsEnergyLevel = e.target.value;
      renderStack();
    });
    root.querySelectorAll("[data-checkhabit]").forEach(el=>{
      el.addEventListener("click", async (e)=>{
        e.stopPropagation();
        const id = el.dataset.checkhabit;
        const habit = (await idbGetAll("habits")).find(h=>h.id===id);
        if(habit){
          const todayISO = toISODate(new Date());
          habit.completions = habit.completions || {};
          if(habit.completions[todayISO]) delete habit.completions[todayISO];
          else habit.completions[todayISO] = true;
          await idbPut("habits", habit);
          renderStack();
        }
      });
    });
    root.querySelectorAll("[data-skip-habit]").forEach(btn=>{
      btn.addEventListener("click", async (e)=>{
        e.stopPropagation();
        if(btn.classList.contains("disabled")) return;
        const id = btn.dataset.skipHabit;
        const habit = (await idbGetAll("habits")).find(h=>h.id===id);
        if(!habit) return;
        const settings = Object.fromEntries((await idbGetAll("settings")).map(s=>[s.key,s.value]));
        const weekStartDay = settings.weekStart ?? 1;
        const weekISOs = getWeekDates(0, weekStartDay).map(toISODate);
        habit.completions = habit.completions || {};
        const alreadyUsed = weekISOs.some(d=>habit.completions[d] === "skip");
        if(alreadyUsed) return;
        habit.completions[toISODate(new Date())] = "skip";
        await idbPut("habits", habit);
        renderStack();
      });
    });
    makeSwipeOnly(root, ".habit-card", {
      onEdit: async (id)=>{
        const habit = (await idbGetAll("habits")).find(h=>h.id===id);
        if(habit) openHabitModal(habit);
      },
      onDelete: async (id)=>{
        await idbDelete("habits", id);
        renderStack();
      }
    });
    layoutHabitConnectors(root);
  }

  if(screenName === "reglages"){
    root.querySelector("#rName").addEventListener("change", async (e)=>{
      await idbPut("settings", {key:"userName", value: e.target.value.trim()});
    });
    root.querySelector("#rLanguage").addEventListener("change", async (e)=>{
      await idbPut("settings", {key:"language", value: e.target.value});
      state.language = e.target.value;
      renderStack();
    });
    root.querySelector("#rWeekStart").addEventListener("change", async (e)=>{
      await idbPut("settings", {key:"weekStart", value: parseInt(e.target.value, 10)});
    });
    root.querySelector("#rTheme").addEventListener("change", async (e)=>{
      await idbPut("settings", {key:"appTheme", value: e.target.value});
      applyTheme(e.target.value);
    });
    root.querySelector("#rAllowSkip").addEventListener("change", async (e)=>{
      await idbPut("settings", {key:"allowHabitSkip", value: e.target.checked});
    });

    root.querySelector("#exportDataBtn").addEventListener("click", ()=>{
      openModal(`
        <h3>${tr("exportTitle")}</h3>
        <p style="font-size:14px; line-height:1.5; margin-bottom:18px;">${tr("exportMsg")}</p>
        <div class="modal-actions" style="justify-content:center;">
          <button class="btn-primary" id="exportMsgConfirm">${tr("telecharger")}</button>
        </div>
      `);
      document.getElementById("exportMsgConfirm").addEventListener("click", async ()=>{
        await exportAllData();
        closeModal();
      });
    });

    const importInput = root.querySelector("#importFileInput");
    root.querySelector("#importDataBtn").addEventListener("click", ()=> importInput.click());
    importInput.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      e.target.value = "";
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        let payload;
        try{ payload = JSON.parse(ev.target.result); }
        catch(err){ payload = null; }
        if(!payload || typeof payload.data !== "object"){
          openModal(`
            <h3>${tr("importErrorTitle")}</h3>
            <p style="font-size:14px; line-height:1.5; margin-bottom:18px;">${tr("importErrorMsg")}</p>
            <div class="modal-actions" style="justify-content:center;">
              <button class="btn-primary" id="importErrorClose">${tr("fermer")}</button>
            </div>
          `);
          document.getElementById("importErrorClose").addEventListener("click", closeModal);
          return;
        }
        openModal(`
          <h3>${tr("importConfirmTitle")}</h3>
          <p style="font-size:14px; line-height:1.5; margin-bottom:18px;">${tr("importConfirmMsg")}</p>
          <div class="modal-actions">
            <button class="btn-delete" id="importConfirmBtn">${tr("importConfirmBtn")}</button>
            <button class="btn-ghost" id="importCancelBtn">${tr("annuler")}</button>
          </div>
        `);
        document.getElementById("importCancelBtn").addEventListener("click", closeModal);
        document.getElementById("importConfirmBtn").addEventListener("click", async ()=>{
          await restoreAllData(payload);
          closeModal();
          const settings = Object.fromEntries((await idbGetAll("settings")).map(s=>[s.key,s.value]));
          applyTheme(settings.appTheme);
          state.language = settings.language || "fr";
          state.currentSlotThemeOverride = null;
          state.currentItemOverride = null;
          state.projetsStackMemory = null;
          state.stack = [{screen:"dashboard"}];
          renderStack();
        });
      };
      reader.readAsText(file);
    });
  }
}

/* Repli/dépli et vidage de la section "Terminé" */
function attachDoneSectionEvents(root){
  root.querySelectorAll("[data-donetoggle]").forEach(header=>{
    header.addEventListener("click", (e)=>{
      if(e.target.closest("[data-cleardone]")) return;
      const key = header.dataset.donetoggle;
      root.querySelector("#doneList-"+key).classList.toggle("collapsed");
    });
  });
  root.querySelectorAll("[data-cleardone]").forEach(btn=>{
    btn.addEventListener("click", async (e)=>{
      e.stopPropagation();
      const key = btn.dataset.cleardone;
      const list = root.querySelector("#doneList-"+key);
      const ids = [...list.querySelectorAll("[data-item]")].map(el=>el.dataset.item);
      for(const id of ids) await idbDelete("tasks", id);
      renderStack();
    });
  });
}

function attachItemRowEvents(root){
  root.querySelectorAll("[data-checktask]").forEach(el=>{
    el.addEventListener("click", async (e)=>{
      e.stopPropagation();
      const id = el.dataset.checktask;
      const task = (await idbGetAll("tasks")).find(t=>t.id===id);
      if(task){ task.status = task.status==="done" ? "todo" : "done"; await idbPut("tasks", task); renderStack(); }
    });
  });
  root.querySelectorAll('.item-row[data-kind="project"]').forEach(row=>{
    row.addEventListener("click", ()=>{
      if(row.classList.contains("dragging")) return;
      if(row.classList.contains("swiped-open")){ closeSwipeRow(row); return; }
      pushScreen({screen:"projectDetail", projectId: row.dataset.item});
    });
  });
  root.querySelectorAll('.item-row[data-kind="task"][data-has-desc="1"]').forEach(row=>{
    row.addEventListener("click", ()=>{
      if(row.classList.contains("dragging")) return;
      if(row.classList.contains("swiped-open")){ closeSwipeRow(row); return; }
      row.classList.toggle("desc-open");
    });
  });
  root.querySelectorAll("[data-inline-name]").forEach(nameEl=>{
    nameEl.addEventListener("click", (e)=>{
      const row = nameEl.closest(".item-row");
      const hasDesc = row && row.dataset.hasDesc === "1";
      if(hasDesc && !row.classList.contains("desc-open")){
        // Laisse le clic remonter au gestionnaire de la ligne, qui déplie la description.
        return;
      }
      e.stopPropagation();
      startInlineNameEdit(nameEl, nameEl.dataset.inlineName);
    });
  });
  root.querySelectorAll("[data-inline-desc]").forEach(descEl=>{
    descEl.addEventListener("click", (e)=>{
      if(e.target.closest("a")) return; // laisser les liens s'ouvrir normalement
      e.stopPropagation();
      startInlineDescEdit(descEl, descEl.dataset.inlineDesc);
    });
  });
}

function startInlineNameEdit(nameEl, taskId){
  if(nameEl.querySelector("input")) return;
  const original = nameEl.textContent;
  nameEl.textContent = "";
  const input = document.createElement("input");
  input.type = "text";
  input.className = "inline-edit-input";
  input.value = original;
  nameEl.appendChild(input);
  input.focus();
  input.select();
  let done = false;
  const commit = async ()=>{
    if(done) return;
    done = true;
    const val = input.value.trim();
    if(val && val !== original){
      const task = (await idbGetAll("tasks")).find(t=>t.id===taskId);
      if(task){ task.name = val; await idbPut("tasks", task); }
    }
    renderStack();
  };
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", (ev)=>{
    if(ev.key === "Enter") input.blur();
    if(ev.key === "Escape"){ done = true; renderStack(); }
  });
}

function startInlineDescEdit(descEl, taskId){
  if(descEl.querySelector("textarea")) return;
  const original = descEl.textContent;
  descEl.innerHTML = "";
  const textarea = document.createElement("textarea");
  textarea.className = "inline-edit-textarea";
  textarea.value = original;
  textarea.rows = 3;
  descEl.appendChild(textarea);
  textarea.focus();
  let done = false;
  const commit = async ()=>{
    if(done) return;
    done = true;
    const val = textarea.value.trim();
    const task = (await idbGetAll("tasks")).find(t=>t.id===taskId);
    if(task){ task.description = val; await idbPut("tasks", task); }
    renderStack();
  };
  textarea.addEventListener("blur", commit);
  textarea.addEventListener("keydown", (ev)=>{
    if(ev.key === "Escape"){ done = true; renderStack(); }
  });
}

function attachCatFormEvents(root){
  let selectedColor = SWATCH_COLORS[0];
  root.querySelectorAll(".swatch").forEach(sw=>{
    sw.addEventListener("click", ()=>{
      root.querySelectorAll(".swatch").forEach(s=>s.classList.remove("selected"));
      sw.classList.add("selected");
      selectedColor = sw.dataset.color;
    });
  });
  root.querySelector("#cancelCatBtn").addEventListener("click", ()=>{
    root.querySelector("#catFormHolder").innerHTML = "";
  });
  root.querySelector("#saveCatBtn").addEventListener("click", async ()=>{
    const name = root.querySelector("#newCatName").value.trim();
    if(!name) return;
    const themes = await idbGetAll("themes");
    await idbPut("themes", {
      id: uid(), name, color: selectedColor,
      forProjects:true, forSlots:true, isDefault:false,
      order: themes.length
    });
    renderStack();
  });
}

/* =========================================================================
   Modale générique (modifier / supprimer)
   ========================================================================= */
function openModal(html){
  document.getElementById("modalBox").innerHTML = html;
  document.getElementById("modalOverlay").style.display = "flex";
}
function closeModal(){
  document.getElementById("modalOverlay").style.display = "none";
  document.getElementById("modalBox").innerHTML = "";
}
document.getElementById("modalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "modalOverlay") closeModal();
});

/* Suppression en 2 clics (pas de confirm() natif, qui ne fonctionne pas dans un aperçu en iframe) */
function attachTwoStepDelete(btn, onConfirm){
  let armed = false;
  btn.addEventListener("click", ()=>{
    if(!armed){
      armed = true;
      btn.textContent = "Confirmer la suppression";
      btn.classList.add("armed");
    } else {
      onConfirm();
    }
  });
}

let modalContext = {};

/* ---- Formulaire projet / tâche ---- */
function itemFormHtml(kind, existing, showCategory, themesList){
  const isTask = kind === "task";
  const starred = !!(existing && existing.starred);
  return `
  <h3>${existing ? (isTask?tr("modifierTache"):tr("modifierProjet")) : (isTask?tr("ajouterTache"):tr("ajouterProjet"))}</h3>
  <input type="text" id="mName" placeholder="${tr("nom")}" value="${existing ? escapeHtml(existing.name) : ""}">
  ${showCategory ? `
  <label>${tr("categorie")}</label>
  <select id="mTheme">
    ${themesList.map(t=>`<option value="${t.id}">${escapeHtml(themeDisplayName(t))}</option>`).join("")}
  </select>
  ` : ``}
  <label>${tr("echeanceOpt")}</label>
  <div class="field-with-clear">
    <input type="date" id="mDeadline" value="${existing && existing.deadline ? existing.deadline : ""}">
    <button type="button" class="clear-field-btn" id="mDeadlineClear" aria-label="${tr("retirerEcheance")}">${ICONS.close}</button>
  </div>
  <label>${tr("priorite")}</label>
  <select id="mPriority">
    <option value="aucune">${tr("aucunePriorite")}</option>
    <option value="faible">${tr("faible")}</option>
    <option value="moyenne">${tr("moyenne")}</option>
    <option value="elevee">${tr("elevee")}</option>
  </select>
  ${isTask ? `
  <label>${tr("recurrenceLabel")}</label>
  <select id="mRecurrence">
    <option value="aucune">${tr("aucuneRec")}</option>
    <option value="quotidienne">${tr("tousLesJours")}</option>
    <option value="hebdomadaire">${tr("toutesLesSemaines")}</option>
    <option value="2semaines">${tr("toutesLes2Semaines")}</option>
    <option value="mensuelle">${tr("tousLesMois")}</option>
    <option value="annuelle">${tr("tousLesAns")}</option>
  </select>
  <div class="star-toggle-row">
    <span>${tr("tachePrioritaireJour")}</span>
    <button type="button" class="star-toggle ${starred?'active':''}" id="mStarredToggle" aria-pressed="${starred}">${ICONS.star}</button>
  </div>
  <label>${tr("descriptionLabel")}</label>
  <textarea id="mDescription" placeholder="${tr("descriptionPlaceholder")}" rows="4">${existing && existing.description ? escapeHtml(existing.description) : ""}</textarea>
  ` : ``}
  <div class="modal-actions">
    <button class="btn-primary" id="mSave">${tr("enregistrer")}</button>
    ${existing ? `<button class="btn-delete" id="mDelete">${tr("supprimer")}</button>` : ""}
    <button class="btn-ghost" id="mCancel">${tr("annuler")}</button>
  </div>`;
}

async function openItemModal(kind, existing, context){
  context = context || {};
  // La catégorie ne se change que pour les projets et les tâches seules (pas les sous-tâches, qui héritent de leur projet)
  const showCategory = !(existing && existing.projectId) && !context.projectId;
  let themesList = [];
  if(showCategory) themesList = (await idbGetAll("themes")).filter(t=>t.forProjects).sort((a,b)=>(a.order||0)-(b.order||0));

  modalContext = {kind, existing, context, showCategory};
  openModal(itemFormHtml(kind, existing, showCategory, themesList));
  document.getElementById("mPriority").value = existing ? (existing.priority || "aucune") : "aucune";
  if(kind === "task"){
    document.getElementById("mRecurrence").value = existing ? (existing.recurrence || "aucune") : "aucune";
  }
  if(showCategory){
    document.getElementById("mTheme").value = existing ? existing.themeId : (context.themeId || "default");
  }
  document.getElementById("mCancel").addEventListener("click", closeModal);
  document.getElementById("mSave").addEventListener("click", saveItemModal);
  document.getElementById("mDeadlineClear").addEventListener("click", ()=>{
    document.getElementById("mDeadline").value = "";
  });
  const starToggle = document.getElementById("mStarredToggle");
  if(starToggle){
    starToggle.addEventListener("click", ()=>{
      const active = starToggle.classList.toggle("active");
      starToggle.setAttribute("aria-pressed", active);
    });
  }
  const delBtn = document.getElementById("mDelete");
  if(delBtn){
    attachTwoStepDelete(delBtn, async ()=>{
      const store = kind === "project" ? "projects" : "tasks";
      if(kind === "project"){
        const subs = await getSubtasks(existing.id);
        for(const s of subs) await idbDelete("tasks", s.id);
      }
      await idbDelete(store, existing.id);
      closeModal();
      const top = state.stack[state.stack.length-1];
      if(top.screen === "projectDetail" && top.projectId === existing.id) popScreen();
      else renderStack();
    });
  }
}

async function saveItemModal(){
  const {kind, existing, context, showCategory} = modalContext;
  const name = document.getElementById("mName").value.trim();
  if(!name) return;
  const deadline = document.getElementById("mDeadline").value || null;
  const priority = document.getElementById("mPriority").value;
  const store = kind === "project" ? "projects" : "tasks";
  const obj = existing ? {...existing} : {
    id: uid(), status: "active", order: Date.now(),
    themeId: context.themeId || "default",
    projectId: context.projectId || null
  };
  obj.name = name;
  obj.deadline = deadline;
  obj.priority = priority;
  if(showCategory){
    obj.themeId = document.getElementById("mTheme").value;
  }
  if(kind === "task"){
    obj.recurrence = document.getElementById("mRecurrence").value;
    const starToggle = document.getElementById("mStarredToggle");
    obj.starred = starToggle ? starToggle.classList.contains("active") : false;
    obj.description = document.getElementById("mDescription").value.trim();
  }
  await idbPut(store, obj);
  closeModal();
  renderStack();
}

/* ---- Formulaire catégorie (édition) ---- */
function catEditFormHtml(theme){
  return `
  <h3>${tr("modifierCategorie")}</h3>
  <input type="text" id="mCatName" value="${escapeHtml(themeDisplayName(theme))}" maxlength="30">
  <div class="swatches" id="mCatSwatches">
    ${SWATCH_COLORS.map(c=>`<div class="swatch ${c===theme.color?'selected':''}" data-color="${c}" style="background:${c}"></div>`).join("")}
  </div>
  <div class="modal-actions">
    <button class="btn-primary" id="mCatSave">${tr("enregistrer")}</button>
    ${theme.isDefault ? "" : `<button class="btn-delete" id="mCatDelete">${tr("supprimer")}</button>`}
    <button class="btn-ghost" id="mCatCancel">${tr("annuler")}</button>
  </div>`;
}

function openCatEditModal(theme){
  let selectedColor = theme.color;
  openModal(catEditFormHtml(theme));
  document.querySelectorAll("#mCatSwatches .swatch").forEach(sw=>{
    sw.addEventListener("click", ()=>{
      document.querySelectorAll("#mCatSwatches .swatch").forEach(s=>s.classList.remove("selected"));
      sw.classList.add("selected");
      selectedColor = sw.dataset.color;
    });
  });
  document.getElementById("mCatCancel").addEventListener("click", closeModal);
  document.getElementById("mCatSave").addEventListener("click", async ()=>{
    const name = document.getElementById("mCatName").value.trim();
    if(!name) return;
    if(name !== themeDisplayName(theme)) theme.nameCustomized = true;
    theme.name = name; theme.color = selectedColor;
    await idbPut("themes", theme);
    closeModal();
    renderStack();
  });
  const delBtn = document.getElementById("mCatDelete");
  if(delBtn){
    attachTwoStepDelete(delBtn, async ()=>{
      // Les projets/tâches de cette catégorie sont réaffectés à "Non classé", jamais supprimés
      const projects = await idbGetAll("projects");
      const tasks = await idbGetAll("tasks");
      for(const p of projects) if(p.themeId === theme.id){ p.themeId = "default"; await idbPut("projects", p); }
      for(const t of tasks) if(t.themeId === theme.id){ t.themeId = "default"; await idbPut("tasks", t); }
      await idbDelete("themes", theme.id);
      closeModal();
      state.stack = [{screen:"cats"}];
      renderStack();
    });
  }
}

/* ---- Sélecteur de catégorie pour le Dashboard (remplace la navigation vers Projets) ---- */
async function openThemePickerModal(){
  const themes = (await idbGetAll("themes")).filter(t=>t.forSlots || t.forProjects).sort((a,b)=>(a.order||0)-(b.order||0));
  openModal(`
    <h3>Choisir une catégorie</h3>
    <div class="theme-picker-list">
      ${themes.map(t=>`<button class="theme-pick-btn" data-pick-theme="${t.id}" style="background:${t.color}">${escapeHtml(themeDisplayName(t))}</button>`).join("")}
    </div>
    <div class="modal-actions"><button class="btn-ghost" id="mCancelPick">${tr("annuler")}</button></div>
  `);
  document.getElementById("mCancelPick").addEventListener("click", closeModal);
  document.querySelectorAll("[data-pick-theme]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.currentSlotThemeOverride = btn.dataset.pickTheme;
      state.currentItemOverride = null;
      closeModal();
      renderStack();
    });

/* =========================================================================
   Drag & drop reorder (pointer-based, touch friendly)
   ========================================================================= */
function closeSwipeRow(row){
  const content = row.querySelector(".swipe-content");
  if(content){
    content.style.transition = "transform .2s ease";
    content.style.transform = "translateX(0)";
  }
  row.classList.remove("swiped-open");
}
function closeOtherSwipes(exceptRow){
  document.querySelectorAll(".swiped-open").forEach(row=>{
    if(row !== exceptRow) closeSwipeRow(row);
  });
}

const SWIPE_REVEAL_PX = 112;

/* Version simplifiée, glissement latéral uniquement (pas de réordonnancement vertical) —
   utilisée pour les habitudes, qui ne sont pas réordonnables. */
function makeSwipeOnly(root, itemSelector, handlers){
  const DECIDE_PX = 10;
  root.querySelectorAll(itemSelector).forEach(item=>{
    const content = item.querySelector(".swipe-content");
    if(!content) return;
    item.addEventListener("pointerdown", (e)=>{
      if(e.target.closest("[data-checkhabit]") || e.target.closest(".swipe-btn") || e.target.closest("[data-skip-habit]")) return;
      startSwipe(item, content, e.pointerId, e.clientX, e.clientY);
    });
  });

  function startSwipe(item, content, pointerId, downX, downY){
    let mode = null;
    let lastY = downY;
    const baseX = item.classList.contains("swiped-open") ? -SWIPE_REVEAL_PX : 0;

    function onMove(e){
      if(e.pointerId !== pointerId) return;
      const dx = e.clientX - downX, dy = e.clientY - downY;
      if(mode === null){
        const movedEnough = Math.abs(dx) > DECIDE_PX || Math.abs(dy) > DECIDE_PX;
        if(!movedEnough) return;
        if(Math.abs(dy) >= Math.abs(dx)){ mode = "scrolling"; }
        else { mode = "horizontal"; content.style.transition = "none"; }
      }
      e.preventDefault();
      if(mode === "scrolling"){
        const appEl = document.getElementById("app");
        if(appEl) appEl.scrollTop -= (e.clientY - lastY);
        lastY = e.clientY;
        return;
      }
      const next = Math.min(0, Math.max(-SWIPE_REVEAL_PX, baseX + dx));
      content.style.transform = `translateX(${next}px)`;
    }
    function finish(e){
      if(e && e.pointerId !== pointerId) return;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", finish);
      document.removeEventListener("pointercancel", finish);
      if(mode === "horizontal"){
        content.style.transition = "transform .2s ease";
        const dx = (e && e.clientX != null ? e.clientX : downX) - downX;
        const next = baseX + dx;
        if(next < -SWIPE_REVEAL_PX/2){
          closeOtherSwipes(item);
          content.style.transform = `translateX(-${SWIPE_REVEAL_PX}px)`;
          item.classList.add("swiped-open");
        } else {
          content.style.transform = "translateX(0)";
          item.classList.remove("swiped-open");
        }
      }
    }
    document.addEventListener("pointermove", onMove, {passive:false});
    document.addEventListener("pointerup", finish);
    document.addEventListener("pointercancel", finish);
  }

  root.querySelectorAll("[data-swipe-edit-habit]").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      handlers.onEdit(btn.dataset.swipeEditHabit);
      closeSwipeRow(btn.closest(".habit-card"));
    });
  });
  root.querySelectorAll("[data-swipe-delete-habit]").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      handlers.onDelete(btn.dataset.swipeDeleteHabit);
    });
  });
}

/* Réordonnancement vertical (appui long 1s) ET glissement latéral (éditer/supprimer) réunis dans
   UN SEUL système de geste par élément — les gérer séparément créait des écouteurs concurrents
   qui se marchaient dessus. Chaque pointerdown ouvre une "session" qui, au premier mouvement net,
   choisit UNE fois pour toutes entre : scroll natif (vertical, on ne touche à rien), glisser pour
   réordonner (vertical, après 1s d'immobilité), ou glissement latéral (horizontal, si swipeHandlers
   est fourni). */
function makeDraggable(root, listSelector, itemSelector, storeKind, swipeHandlers){
  const list = root.querySelector(listSelector);
  if(!list) return;

  const LONG_PRESS_MS = 1000;
  const DECIDE_PX = 10;

  list.querySelectorAll(itemSelector).forEach(item=>{
    const content = item.querySelector(".swipe-content");
    item.addEventListener("pointerdown", (e)=>{
      if(e.target.closest("[data-checktask]") || e.target.closest("select") || e.target.closest(".swipe-btn")) return;
      startGesture(item, content, e.pointerId, e.clientX, e.clientY);
    });
  });

  function startGesture(item, content, pointerId, downX, downY){
    let mode = null; // null | "vertical" | "horizontal" | "scrolling"
    let lastY = downY;
    const baseX = item.classList.contains("swiped-open") ? -SWIPE_REVEAL_PX : 0;

    const itemsInitial = [...list.querySelectorAll(itemSelector)];
    const startIndex = itemsInitial.indexOf(item);
    let order = [...itemsInitial];
    const style = getComputedStyle(item);
    const rowHeight = item.offsetHeight + (parseFloat(style.marginBottom) || 0);

    function activateVertical(){
      if(mode !== null) return;
      mode = "vertical";
      item.classList.add("dragging");
      item.style.zIndex = 10;
    }
    const holdTimer = setTimeout(activateVertical, LONG_PRESS_MS);

    function onMove(e){
      if(e.pointerId !== pointerId) return;
      const dx = e.clientX - downX;
      const dy = e.clientY - downY;

      if(mode === null){
        const movedEnough = Math.abs(dx) > DECIDE_PX || Math.abs(dy) > DECIDE_PX;
        if(!movedEnough) return;
        if(Math.abs(dy) >= Math.abs(dx)){
          // Intention de scroll : les lignes bloquent le pan natif (touch-action:none, nécessaire
          // pour que le drag vertical fonctionne de façon fiable), donc on fait défiler #app
          // nous-mêmes pour que ça continue à scroller normalement.
          clearTimeout(holdTimer);
          mode = "scrolling";
        } else if(swipeHandlers && content){
          clearTimeout(holdTimer);
          mode = "horizontal";
          content.style.transition = "none";
        } else {
          return; // mouvement horizontal mais pas de swipe dispo ici : on attend le hold vertical
        }
      }

      if(mode === "scrolling"){
        e.preventDefault();
        const appEl = document.getElementById("app");
        if(appEl) appEl.scrollTop -= (e.clientY - lastY);
        lastY = e.clientY;
        return;
      }

      if(mode === "horizontal"){
        e.preventDefault();
        const next = Math.min(0, Math.max(-SWIPE_REVEAL_PX, baseX + dx));
        content.style.transform = `translateX(${next}px)`;
        return;
      }

      if(mode === "vertical"){
        e.preventDefault();
        item.style.transform = `translateY(${dy}px)`;
        const shift = Math.round(dy / rowHeight);
        const targetIndex = Math.min(Math.max(startIndex + shift, 0), itemsInitial.length - 1);
        const currentIndex = order.indexOf(item);
        if(targetIndex !== currentIndex){
          order.splice(currentIndex, 1);
          order.splice(targetIndex, 0, item);
          itemsInitial.forEach((el, originalIdx)=>{
            if(el === item) return;
            const newIdx = order.indexOf(el);
            const offset = (newIdx - originalIdx) * rowHeight;
            el.style.transform = offset ? `translateY(${offset}px)` : "";
          });
        }
        // Défilement automatique près des bords : sans ça, descendre un élément vers le bas
        // de l'écran semblait "ne rien faire" dès qu'on atteignait le bord visible.
        const appEl = document.getElementById("app");
        if(appEl){
          const rect = appEl.getBoundingClientRect();
          const EDGE = 70;
          if(e.clientY < rect.top + EDGE) appEl.scrollTop -= 14;
          else if(e.clientY > rect.bottom - EDGE) appEl.scrollTop += 14;
        }
      }
    }

    function finish(e){
      if(e && e.pointerId !== pointerId) return;
      clearTimeout(holdTimer);
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", finish);
      document.removeEventListener("pointercancel", finish);

      if(mode === "vertical"){
        // Applique l'ordre final au vrai DOM. Comme le transform de chaque ligne représentait déjà
        // exactement sa position finale, l'enlever juste après ne produit aucun saut visuel.
        order.forEach(el=> list.appendChild(el));
        itemsInitial.forEach(el=>{ el.style.transform = ""; el.style.zIndex = ""; });
        item.classList.remove("dragging");
        persistOrder(list, itemSelector, storeKind);
      } else if(mode === "horizontal"){
        content.style.transition = "transform .2s ease";
        const dx = (e && e.clientX != null ? e.clientX : downX) - downX;
        const next = baseX + dx;
        if(next < -SWIPE_REVEAL_PX/2){
          closeOtherSwipes(item);
          content.style.transform = `translateX(-${SWIPE_REVEAL_PX}px)`;
          item.classList.add("swiped-open");
        } else {
          content.style.transform = "translateX(0)";
          item.classList.remove("swiped-open");
        }
      }
    }

    document.addEventListener("pointermove", onMove, {passive:false});
    document.addEventListener("pointerup", finish);
    document.addEventListener("pointercancel", finish);
  }

  if(swipeHandlers){
    root.querySelectorAll("[data-swipe-edit-item], [data-swipe-edit-cat]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const id = btn.dataset.swipeEditItem || btn.dataset.swipeEditCat;
        const kind = btn.dataset.swipeEditKind;
        swipeHandlers.onEdit(id, kind);
        closeSwipeRow(btn.closest(".item-row, .cat-row"));
      });
    });
    root.querySelectorAll("[data-swipe-delete-item], [data-swipe-delete-cat]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const id = btn.dataset.swipeDeleteItem || btn.dataset.swipeDeleteCat;
        const kind = btn.dataset.swipeDeleteKind;
        swipeHandlers.onDelete(id, kind);
      });
    });
  }
}

async function persistOrder(list, itemSelector, storeKind){
  const els = [...list.querySelectorAll(itemSelector)];
  for(let i=0;i<els.length;i++){
    const el = els[i];
    if(storeKind === "themes"){
      const t = (await idbGetAll("themes")).find(x=>x.id===el.dataset.cat);
      if(t){ t.order = i; await idbPut("themes", t); }
    } else {
      const kind = el.dataset.kind;
      const store = kind === "project" ? "projects" : "tasks";
      const obj = (await idbGetAll(store)).find(x=>x.id===el.dataset.item);
      if(obj){ obj.order = i; await idbPut(store, obj); }
    }
  }
}

/* =========================================================================
   Quick add
   ========================================================================= */
document.getElementById("quickAddSend").addEventListener("click", quickAdd);
document.getElementById("quickAddInput").addEventListener("keydown", (e)=>{ if(e.key==="Enter") quickAdd(); });

async function quickAdd(){
  const input = document.getElementById("quickAddInput");
  const name = input.value.trim();
  if(!name) return;
  const top = state.stack[state.stack.length-1];

  let themeId = "default";
  let projectId = null;

  if(top.screen === "catDetail") themeId = top.themeId;
  if(top.screen === "projectDetail"){
    projectId = top.projectId;
    const project = (await idbGetAll("projects")).find(p=>p.id===projectId);
    themeId = project ? project.themeId : "default";
  }

  await idbPut("tasks", {
    id: uid(), name, projectId, themeId,
    deadline:null, priority:"aucune", status:"active",
    order: Date.now(), starred:false, recurrence:"aucune"
  });
  input.value = "";
  renderStack();
}

/* =========================================================================
   BOOT
   ========================================================================= */
(async function boot(){
  await openDB();
  await seedDefaults();
  const settings = Object.fromEntries((await idbGetAll("settings")).map(s=>[s.key,s.value]));
  applyTheme(settings.appTheme);
  state.language = settings.language || "fr";
  renderStack();
  await checkWeekRollover();
  checkForNewVersion();
})();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(err=>{
      console.warn("Service worker non enregistré :", err);
    });
  });
}

/* Sur mobile, rouvrir l'app depuis l'arrière-plan ne recharge pas forcément la page :
   on revérifie donc aussi le changement de semaine et la disponibilité d'une nouvelle version
   à chaque retour au premier plan. */
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    checkWeekRollover();
    checkForNewVersion();
  }
});
